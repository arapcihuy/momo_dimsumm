<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Momo Dimsum | Links & Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'TAN songberd';
      src: url('TAN-Songbird/TANSONGBIRD.otf') format('opentype'),
           url('TAN-Songbird/TANSONGBIRD.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --primary: #f08a52;
      --primary-hover: #ff9d68;
      --bg: #0f0a08;
      --surface: rgba(30, 22, 18, 0.6);
      --surface-hover: rgba(50, 36, 30, 0.8);
      --border: rgba(240, 138, 82, 0.2);
      --text: #fdfaf8;
      --text-muted: #d2b9aa;
      --glow: rgba(240, 138, 82, 0.15);
      --radius: 20px;
    }
    
    [data-theme="light"] {
      --primary: #c85d2e;
      --primary-hover: #aa4b22;
      --bg: #fcf9f6;
      --surface: rgba(255, 255, 255, 0.7);
      --surface-hover: rgba(255, 255, 255, 0.95);
      --border: rgba(200, 93, 46, 0.15);
      --text: #2a1d14;
      --text-muted: #7d6455;
      --glow: rgba(200, 93, 46, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      position: relative;
      overflow-x: hidden;
      transition: background-color 0.5s ease, color 0.5s ease;
    }

    /* Dynamic Background with Mesh Gradient & Grain */
    .bg-animation {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -2;
      background: var(--bg);
      overflow: hidden;
      transition: background 0.5s ease;
    }
    
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.6;
      animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    
    .blob-1 {
      top: -10%; left: -10%;
      width: 60vw; height: 60vw;
      background: var(--primary);
    }
    .blob-2 {
      bottom: -20%; right: -10%;
      width: 70vw; height: 70vw;
      background: #e6b054;
      animation-delay: -5s;
      animation-duration: 25s;
    }
    .blob-3 {
      top: 40%; left: 50%;
      width: 50vw; height: 50vw;
      background: #ff5e62;
      animation-delay: -10s;
      animation-duration: 22s;
      opacity: 0.4;
    }
    .blob-4 {
      top: -20%; right: 20%;
      width: 40vw; height: 40vw;
      background: #ff9966;
      animation-delay: -15s;
      animation-duration: 18s;
      opacity: 0.5;
    }

    .bg-grain {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1;
      opacity: 0.06;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    [data-theme="light"] .bg-grain {
      opacity: 0.12;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(15%, 10%) scale(1.1); }
      66% { transform: translate(-10%, 20%) scale(0.9); }
      100% { transform: translate(-5%, -15%) scale(1.05); }
    }

    .container {
      width: 100%;
      max-width: 480px;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Top Actions */
    .top-actions {
      display: flex;
      justify-content: flex-end;
    }
    .theme-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 44px; height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .theme-toggle:hover {
      background: var(--surface-hover);
      transform: scale(1.05);
    }

    /* Profile */
    .profile {
      text-align: center;
      animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .profile-img-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
    }
    .profile-img-wrap::before {
      content: '';
      position: absolute;
      top: -5px; right: -5px; bottom: -5px; left: -5px;
      border-radius: 50%;
      background: linear-gradient(45deg, var(--primary), #e6b054);
      z-index: -1;
      filter: blur(15px);
      opacity: 0.6;
      animation: pulse 3s infinite alternate;
    }
    .profile-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--surface-hover);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .brand-name {
      font-family: 'TAN songberd', 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: normal;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }
    .tagline {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.5;
      max-width: 320px;
      margin: 0 auto;
    }

    /* Links List */
    .links-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      perspective: 1000px;
    }
    
    .link-item {
      display: flex;
      align-items: center;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .link-item:nth-child(1) { animation-delay: 0.1s; }
    .link-item:nth-child(2) { animation-delay: 0.2s; }
    .link-item:nth-child(3) { animation-delay: 0.3s; }
    .link-item:nth-child(4) { animation-delay: 0.4s; }
    
    .link-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }

    .link-item:hover {
      transform: translateY(-4px) scale(1.02);
      background: var(--surface-hover);
      border-color: var(--primary);
      box-shadow: 0 12px 24px var(--glow);
    }
    
    .link-item:hover::before {
      transform: translateX(100%);
    }

    .link-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(240, 138, 82, 0.15);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-right: 1rem;
      transition: transform 0.3s ease;
    }
    
    .link-item:hover .link-icon {
      transform: scale(1.1) rotate(5deg);
      background: var(--primary);
      color: var(--bg);
    }

    .link-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .link-title {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.2rem;
    }
    .link-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .link-arrow {
      color: var(--text-muted);
      transition: transform 0.3s ease, color 0.3s ease;
    }
    .link-item:hover .link-arrow {
      transform: translateX(4px);
      color: var(--primary);
    }

    /* Link Colors */
    .link-wa { --primary: #25D366; --glow: rgba(37, 211, 102, 0.2); }
    .link-wa .link-icon { background: rgba(37, 211, 102, 0.15); color: #25D366; }
    
    .link-ig { --primary: #E1306C; --glow: rgba(225, 48, 108, 0.2); }
    .link-ig .link-icon { background: rgba(225, 48, 108, 0.15); color: #E1306C; }
    
    .link-tt { --primary: #ff0050; --glow: rgba(255, 0, 80, 0.2); }
    .link-tt .link-icon { background: rgba(255, 0, 80, 0.15); color: #ff0050; }
    
    .link-maps { --primary: #4285F4; --glow: rgba(66, 133, 244, 0.2); }
    .link-maps .link-icon { background: rgba(66, 133, 244, 0.15); color: #4285F4; }

    /* Menu Image Section */
    .menu-section {
      margin-top: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      overflow: hidden;
      padding: 1.25rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s forwards cubic-bezier(0.16, 1, 0.3, 1) 0.5s;
    }
    .menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .menu-title {
      font-family: 'TAN songberd', 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .menu-img-wrap {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      cursor: zoom-in;
    }
    .menu-img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .menu-img-wrap:hover .menu-img {
      transform: scale(1.05);
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      to { opacity: 0.9; transform: scale(1.08); }
    }

    /* Modal for Menu */
    .modal {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 2rem;
    }
    .modal.active {
      opacity: 1;
      pointer-events: all;
    }
    .modal-img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 12px;
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .modal.active .modal-img {
      transform: scale(1);
    }
    .modal-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1.5rem;
      transition: background 0.3s;
    }
    .modal-close:hover {
      background: rgba(255,255,255,0.3);
    }
    
    @supports (-webkit-backdrop-filter: none) or (backdrop-filter: none) {
      .theme-toggle, .link-item, .menu-section {
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
      }
      .modal {
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
      }
    }
  </style>
</head>
<body>

    <!-- Menu Section -->

  <!-- Modal -->

    <img src="77E60FAF-C154-43D5-9CEA-EBCB481EDE2C.png" alt="Momo Dimsum Menu Full" class="modal-img" />
  </div>

  <script>
    // Theme Toggle
    const themeBtn = document.getElementById('theme-btn');
    const html = document.documentElement;
    
    // Moon Icon
    const moonIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
    // Sun Icon
    const sunIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;

    themeBtn.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      themeBtn.innerHTML = next === 'dark' ? sunIcon : moonIcon;
    });

    // Check system preference on load
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      html.setAttribute('data-theme', 'light');
      themeBtn.innerHTML = moonIcon;
    } else {
      themeBtn.innerHTML = sunIcon;
    }

    // Modal logic
    const menuTrigger = document.getElementById('menuTrigger');
    const menuModal = document.getElementById('menuModal');
    const modalClose = document.getElementById('modalClose');

    menuTrigger.addEventListener('click', () => {
      menuModal.classList.add('active');
    });

    modalClose.addEventListener('click', () => {
      menuModal.classList.remove('active');
    });

    menuModal.addEventListener('click', (e) => {
      if(e.target === menuModal) {
        menuModal.classList.remove('active');
      }
    });
  </script>
